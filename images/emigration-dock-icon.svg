<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Dock-button silhouette for the Emigration window. Painted as solid shapes; the
     dock decorator uses it as a CSS mask (alpha only) and tints it to match the
     vanilla subsystem-dock icons, so the fill colour here is irrelevant. A migration
     motif: two travelling figures advancing along a rightward flow arrow. -->
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <g fill="#000000">
    <!-- Flow arrow (the migration), pointing right -->
    <path d="M2,40 L40,40 L40,34 L56,44 L40,54 L40,48 L2,48 Z"/>
    <!-- Two figures travelling along it -->
    <circle cx="12" cy="16" r="6"/>
    <path d="M6,40 L6,25 a6,6 0 0 1 12,0 L18,40 Z"/>
    <circle cx="30" cy="16" r="6"/>
    <path d="M24,40 L24,25 a6,6 0 0 1 12,0 L36,40 Z"/>
  </g>
</svg>
