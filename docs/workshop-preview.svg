<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#243042"/>
      <stop offset="100%" stop-color="#121821"/>
    </linearGradient>
    <linearGradient id="parchment" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7eed1"/>
      <stop offset="100%" stop-color="#e7d4a3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <!-- Gold frame to echo the in-game parchment/gold palette -->
  <rect x="26" y="26" width="972" height="972" rx="30" fill="none" stroke="#c9a24c" stroke-width="4" opacity="0.5"/>

  <!-- Mod logo: people migrating rightward along a flow arrow, parchment-on-gold to
       match the Demographics card. Drawn in a ~64-unit box scaled up and centered. -->
  <g transform="translate(192,168) scale(10)">
    <g fill="url(#parchment)" stroke="#c9a24c" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round">
      <!-- Flow arrow (the migration), pointing right -->
      <path d="M4,41 L50,41 L50,37 L62,44 L50,51 L50,47 L4,47 Z"/>
      <!-- Three figures travelling along it -->
      <circle cx="12" cy="19" r="5"/>
      <path d="M7,41 L7,27 a5,5 0 0 1 10,0 L17,41 Z"/>
      <circle cx="28" cy="19" r="5"/>
      <path d="M23,41 L23,27 a5,5 0 0 1 10,0 L33,41 Z"/>
      <circle cx="44" cy="19" r="5"/>
      <path d="M39,41 L39,27 a5,5 0 0 1 10,0 L49,41 Z"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="512" y="838" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="96"
        font-weight="bold" fill="#e7d4a3" letter-spacing="2">EMIGRATION</text>
</svg>
